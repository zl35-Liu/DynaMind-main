subject_id: 1
num_blocks: 7
samples_per_block: 200
seed: 43
device: "cuda"
eeg_time_len: 400

data_dir: "/path/to/DynaMind-main"
eeg_data_path: "/path/to/DynaMind-main/data/EEG_processed/sub{subject_id}.npy"
text_emb_path: "/path/to/DynaMind-main/data/text_embs/text_embeddings.npy"
image_emb_path: "/path/to/DynaMind-main/data/image_embs/video_image_embeddings.npy"
emb_save_dir: "/path/to/DynaMind-main/outputs/RSM"
model_save_dir: "/path/to/DynaMind-main/outputs/RSM/checkpoints/mapper"
meta_info_dir: "/path/to/DynaMind-main/data/Video/meta-info"

label_info:
  video_category:
    file: "All_video_category_40.npy"
  face_appearance:
    file: "All_video_face_apperance.npy"
  human_appearance:
    file: "All_video_human_apperance.npy"
  object_count:
    file: "All_video_obj_number.npy"
    adjust: "-1"
  flow:
    file: "All_video_optical_flow_score.npy"
    adjust: "threshold_1.799"
  color:
    file: "All_video_color.npy"
  concept:
    file: "All_video_category_9.npy"

epochs: 288
batch_size: 120
learning_rate: 9.5e-5
weight_decay: 0.048
min_learning_rate: 1.1e-5
validate_every_n_epochs: 6

training_tasks:
  text_alignment:
    enabled: True
    weight: 0.31
    emb_dim: 102400
  image_alignment:
    enabled: True
    weight: 0.11
    emb_dim: 768
  classification:
    enabled: True
    weight: 0.48
    tasks:
      video_category: 40
      face_appearance: 2
      human_appearance: 2
      object_count: 3
      flow: 2
      color: 7
      concept: 9

loss_weights:
  video_category: 1
  face_appearance: 0
  human_appearance: 0
  object_count: 0
  flow: 0
  color: 0
  concept: 0
