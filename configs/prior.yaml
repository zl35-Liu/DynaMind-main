train:
  mixed_precision: "fp16"
  grad_accum_steps: 1
  grad_norm_clip: 0.95
  num_epochs: 48
  batch_size: 14
  log_interval: 96
  val_interval: 6
  ckpt_interval: 12
  output_dir: "/path/to/DynaMind-main/outputs/RSM/checkpoints/prior"

model:
  model_dim: 768
  depth: 12
  dim_head: 64
  timesteps: 1000
  learned_query_mode: "token"

optimizer:
  prior_lr: 0.000095
  weight_decay: 0.012
  pct_start: 0.12

dataset:
  raw_eeg_path: "/path/to/DynaMind-main/data/raw_eeg_data.npy"
  text_embeds_path: "/path/to/DynaMind-main/data/text_embeds.npy"
  val_split: 0.18
  num_workers: 3

pretrained_encoder:
  model_path: "/path/to/DynaMind-main/outputs/RSM/checkpoints/mapper/best_model_sub1_fold2.pth"
  original_config: "/path/to/DynaMind-main/configs/mapper.yaml"
  eeg_emb_dim: 768
  eeg_time_len: 400

guidance:
  types: ['text_embed', 'image_embed_cond', 'contra_embed']
